<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>

    </header>
    <section>
        <form action="" method="get">
            <!-- A tag fieldset faz um agrupamento de campos que estão relacionados -->
            
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="name">Nome:</label>
                <input type="text" name="userName" id="name" required> <!--O require torna o campo obrigatório-->

                <br>

                <label for="age">Idade:</label>
                <input type="number" name="userAge" id="age" min="12" max="100"> <!--o min e max define o range-->

                <br>

                <label for="birthDate">Data de nasceimento</label>
                <input type="date" name="userBirthDate" id="bithDate" required>

                <br>

                <label for="email">Email</label>
                <input type="email" name="userEmail" id="email" required>

                <br>

                <!--Uso do pattern: []-> os números, {}-> a quatidade de numeros-->
                <label for="numberPhone">Telefone</label>
                <input type="tel" name="userNumberPhone" id="numberPhone" pattern="[0-9]{11}" placeholder="DDD + Número sem espaços ou hífens">

                <br>

                <!--Upload de fotos-->
                <!--O formato "accept="image/*" aceita qualquer formato de imagem-->
                <label for="image">Upload de foto</label>
                <input type="file" accept="image/*" name="userImage" id="image">

            </fieldset>


            <fieldset>
                <legend>Perfil</legend>

                <!--Usando radio (bolinhas de selecao)-->
                <p>Gênero:</p>
                <input type="radio" name="userGender" value="Feminino" id="genderFemale">
                <label for="genderFemale">Feminino</label>

                <input type="radio" name="userGender" value="Masculino" id="genderMale">
                <label for="genderMale">Masculino</label>

                <input type="radio" name="userGender" value="notInformed" id="genderNotInformed">
                <label for="genderNotInformed">Prefiro não informar</label>
                <br>

                <!--Usando Select-->
                <label for="maritalStatus">Estado Civil:</label>
                <select name="userMaritalStatus" id="maritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="casdo">União estável</option>
                </select>

                <!--Selecionando o Estado-->
                <label for="state">Estado:</label>
                <select name="userState" id="state">
                    <option value="notInformed">Selecione...</option>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal">Distrito Federal</option>
                    <option value="espiritoSanto">Espirito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="matoGrosso">Mato Grosso</option>
                    <option value="minasGerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rioDeJaneiro">Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                    <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina">Santa Catarina</option>
                    <option value="saoPaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>

                <!--Campo de cidade-->
                <label for="cidade" id="">Cidade:</label>
                <input type="text" name="userCity" id="cidade" autocomplete="address-line2" pattern="{40}" placeholder="Ex. São Paulo">

            </fieldset>

            <!--Campo de Hábitos-->
            <!--Para multiplas escolhas, basta usar o "checkbox"-->
            <fieldset>
                <legend>Hábitos</legend>
                    <p>Redes Sociais:</p>
                
                <input type="checkbox" name="social" value="instagram" id="instagram">
                <label for="instagram">Instagram</label>

                <br>

                <input type="checkbox" name="social" value="social" id="facebook">
                <label for="facebook">Facebook</label>

                <br>

                <input type="checkbox" name="social" value="social" id="linkedin">
                <label for="linkedin">LikedIn</label>

                <br>

                <input type="checkbox" name="social" value="social" id="x">
                <label for="x">X</label>

            </fieldset>

            <input type="submit">
        </form>
    </section>
    
</body>
</html>
